server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/logsignfb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

logsign.app.jwtSecret=${LOGSIGN_APP_JWT_SECRET:change-me-in-production-logsign-secret}
logsign.app.jwtExpirationMs=${LOGSIGN_APP_JWT_EXPIRATION_MS:86400000}
app.auth.require-email-verification=${APP_AUTH_REQUIRE_EMAIL_VERIFICATION:false}
app.bootstrap.admin.username=${APP_BOOTSTRAP_ADMIN_USERNAME:admin}
app.bootstrap.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:admin@company.com}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:Admin@123}

# Auth App JWT properties
security.jwt.secret=${SECURITY_JWT_SECRET:change-me-in-production-security-secret-at-least-64-characters-long}
security.jwt.access-ttl-seconds=${SECURITY_JWT_ACCESS_TTL_SECONDS:3600}
security.jwt.refresh-ttl-seconds=${SECURITY_JWT_REFRESH_TTL_SECONDS:86400}
security.jwt.issuer=${SECURITY_JWT_ISSUER:logsign-auth-service}
security.jwt.refresh-token-cookie-name=${SECURITY_JWT_REFRESH_TOKEN_COOKIE_NAME:refresh_token}
security.jwt.cookie-http-only=${SECURITY_JWT_COOKIE_HTTP_ONLY:true}
security.jwt.cookie-secure=${SECURITY_JWT_COOKIE_SECURE:false}
security.jwt.cookie-same-site=${SECURITY_JWT_COOKIE_SAME_SITE:Lax}
security.jwt.cookie-domain=${SECURITY_JWT_COOKIE_DOMAIN:}

# OAuth2 Frontend Redirects
app.auth.frontend.success-redirect=${APP_AUTH_FRONTEND_SUCCESS_REDIRECT:http://localhost:5173/oauth2/redirect}
app.auth.frontend.error-redirect=${APP_AUTH_FRONTEND_ERROR_REDIRECT:http://localhost:5173/login?error=true}

# Dummy OAuth2 properties to allow Spring Context initialization
spring.security.oauth2.client.registration.google.client-id=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID:dummy-client-id}
spring.security.oauth2.client.registration.google.client-secret=${SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET:dummy-client-secret}

# CORS config
app.cors.front-end-url=${APP_CORS_FRONT_END_URL:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174}
