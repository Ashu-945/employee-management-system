spring.datasource.url=jdbc:postgresql://localhost:5432/logsignfb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

logsign.app.jwtSecret=bezKoderSecretKeyForAuthenticationPurposeAndSecurityRequirementsOfJWTProtocolWhichMustBeVeryLong
logsign.app.jwtExpirationMs=86400000
