spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/logsignfb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.postgresql.Driver}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

logsign.app.jwtSecret=bezKoderSecretKeyForAuthenticationPurposeAndSecurityRequirementsOfJWTProtocolWhichMustBeVeryLong
logsign.app.jwtExpirationMs=86400000
app.auth.require-email-verification=false
app.bootstrap.admin.username=admin
app.bootstrap.admin.email=admin@company.com
app.bootstrap.admin.password=Admin@123

# Auth App JWT properties
security.jwt.secret=your_super_secret_key_which_needs_to_be_at_least_64_characters_long
security.jwt.access-ttl-seconds=3600
security.jwt.refresh-ttl-seconds=86400
security.jwt.issuer=logsign-auth-service
security.jwt.refresh-token-cookie-name=refresh_token
security.jwt.cookie-http-only=true
security.jwt.cookie-secure=false
security.jwt.cookie-same-site=Lax
security.jwt.cookie-domain=localhost

# OAuth2 Frontend Redirects
app.auth.frontend.success-redirect=http://localhost:5173/oauth2/redirect
app.auth.frontend.error-redirect=http://localhost:5173/login?error=true

# Dummy OAuth2 properties to allow Spring Context initialization
spring.security.oauth2.client.registration.google.client-id=dummy-client-id
spring.security.oauth2.client.registration.google.client-secret=dummy-client-secret

# CORS config
app.cors.front-end-url=http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174
